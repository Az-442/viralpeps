<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <rect width="400" height="120" fill="#1a1a2e" rx="8"/>
  <!-- Octagon shape -->
  <polygon points="80,25 115,40 115,80 80,95 45,80 45,40" fill="none" stroke="#e94560" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner octagon -->
  <polygon points="80,38 102,48 102,72 80,82 58,72 58,48" fill="#e94560" opacity="0.15"/>
  <!-- P letter -->
  <text x="58" y="87" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#e94560" text-anchor="middle">P</text>
  <!-- Divider -->
  <line x1="130" y1="30" x2="130" y2="90" stroke="#333355" stroke-width="2"/>
  <!-- Octagon Peptides text -->
  <text x="150" y="58" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Octagon Peptides</text>
  <text x="150" y="78" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#8888aa">UK Research Peptide Supply</text>
  <!-- Small lab icon -->
  <circle cx="355" cy="50" r="3" fill="#e94560"/>
  <rect x="352" y="54" width="6" height="4" rx="1" fill="#e94560"/>
  <rect x="350" y="58" width="10" height="8" rx="1" fill="#e94560" opacity="0.6"/>
  <line x1="353" y1="66" x2="353" y2="72" stroke="#e94560" stroke-width="1.5"/>
  <line x1="357" y1="66" x2="357" y2="72" stroke="#e94560" stroke-width="1.5"/>
  <line x1="352" y1="72" x2="358" y2="72" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hexagon molecules -->
  <circle cx="340" cy="45" r="1.5" fill="#e94560" opacity="0.4"/>
  <circle cx="345" cy="42" r="1.5" fill="#e94560" opacity="0.3"/>
  <circle cx="350" cy="45" r="1.5" fill="#e94560" opacity="0.4"/>
</svg>
